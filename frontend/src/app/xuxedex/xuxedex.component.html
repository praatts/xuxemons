<div class="container">
    <div class="search-wrapper">
        <img src="search-icon.png" alt="Icono de búsqueda">
        <input type="text" for="pokemon" placeholder="Cerca un xuxemon...">
        <select name="" id="elements" for="xuxemons-elements">
            <option value="el1">Element 1</option>
            <option value="el2">Element 2</option>
            <option value="el3">Element 3</option>
        </select>
        <div class="xuxemon-filter">
            <button class="action-btn">Tots</button>
            <button class="action-btn">Capturat</button>
        </div>
    </div>
    <div class="xuxedex-wrapper">
        @for (xuxemon of xuxemons; track xuxemon.id) {
        <div class="xuxemon-card" [ngClass]="{'owned': xuxemon.owned}">
            @if(!xuxemon.owned) {
                <h2>???</h2>
            } @else {
                <h2>{{ xuxemon.name }}</h2>
            }
            <p class="text-secondary">{{ alterXuxemonId(xuxemon.id) }}</p>
            <img src="test-item.png" [alt]="xuxemon.name">
            <span class="xuxemon-base"></span>
            
        </div>
        }
    </div>
</div>
