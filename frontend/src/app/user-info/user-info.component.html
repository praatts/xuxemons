<h1>{{ title }}</h1>
<p>{{ text }}</p>

<form [formGroup]="infoForm" (ngSubmit)="save()">

    <label for="name">Nombre:</label>
    <div class="input-wrapper" [ngClass]="{'valid-input': infoForm.get('name')?.valid}">

        <input type="text" id="name" formControlName="name" placeholder="Nombre">

        @if (infoForm.get('name')?.valid) {
            <span class="check-mark">✓</span>
        }
    </div>

    <label for="surname">Apellido:</label>
    <div class="input-wrapper" [ngClass]="{'valid-input': infoForm.get('surname')?.valid}">

        <input type="text" id="surname" formControlName="name" placeholder="Apellido">
        @if(infoForm.get('surname')?.valid){
            <span class="check-mark">✓</span>
        }
    </div>

    <label for="email">Email:</label>
    <div class="input-wrapper" [ngClass]="{'valid-input': infoForm.get('email')?.valid}">

        <input type="email" id="email" formControlName="email" placeholder="Email">
        @if(infoForm.get('email')?.valid){
            <span class="check-mark">✓</span>
        }
    </div>

    <label for="password">Contraseña:</label>
    <div class="input-wrapper" [ngClass]="{'valid-input': infoForm.get('password')?.valid}">

        <input type="password" id="password" formControlName="password" placeholder="Contraseña">
        @if(infoForm.get('password')?.valid){
            <span class="check-mark">✓</span>
        }
    </div>

    <button type="submit" [disabled]="infoForm.invalid" [ngClass]="{'disabeled-button': infoForm.invalid}">
        Guardar
    </button>
</form>
