<div class="panel-container">
  <aside class="panel-menu">
    @for(ruta of rutas; track ruta.label){
      <a routerLink="{{ruta.route}}" [routerLinkActive]="'active'" [routerLinkActiveOptions]="{exact: ruta.exact}" (mouseenter)="botonInfoHover = true" (mouseleave)="botonInfoHover = false">
        {{ruta.label}}
      </a>
    }
  </aside>

  <section class="panel-content">
    <router-outlet/>
  </section>
</div>
