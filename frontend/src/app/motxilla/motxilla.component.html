
<div class="motxilla-container">
    <div class="search-wrapper">
        <div class="search-bar">
            <img src="search-icon.png" alt="Icono de búsqueda">
            <input type="text" for="pokemon" placeholder="Cerca un object...">
        </div>
        <div class="info-container"></div>
    </div>
    <div class="object-wrapper">
        <h2>Objectes</h2>
        <div class="object-list">
            <div class="sections-wrapper">
                <button (click)="filterItems('all')">Tots</button>
                <button (click)="filterItems('stackable')">Apilables</button>
                <button (click)="filterItems('no_stackable')">No Apilables</button>
            </div>
            <div class="items">
                @for (slot of filteredMotxilla; track $index) {
                  <div class="item-card">
                    <img src="test-item.png" alt="" class="item-icon">
                    <p class="item-name">{{ slot.item.name }}</p>
                    @if (slot.item.stackable) {
                        <p class="amount-item">X{{ slot.quantity }}</p>
                    } @else {
                        <p class="amount-item">X1</p>
                    }
                  </div>  
                }  
            </div>
        </div>
    </div>
</div>
